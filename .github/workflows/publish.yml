name: Build and publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2  # check for v3 — may still target Node 20
        with:
          version: "1.5.57"   # pin; bump deliberately

      - name: Install TinyTeX (for PDF)
        run: quarto install tinytex --no-prompt

      - name: Install extra LaTeX packages
        run: |
          tlmgr install \
            physics siunitx booktabs tabularx multirow \
            tcolorbox mdframed environ fancyhdr microtype \
            makeidx newtx stix2-otf lm fontaxes xcolor \
            biblatex biber || true   # 'true' so missing-package warnings don't fail the step

      - name: Download APS CSL
        run: |
          curl -fsSo csl/american-physics-society.csl \
            "https://www.zotero.org/styles/american-physics-society"

      - name: Cache Quarto execution
        uses: actions/cache@v4
        with:
          path: _freeze
          key: quarto-freeze-${{ hashFiles('**/*.qmd', 'requirements.txt') }}
          restore-keys: quarto-freeze-

      - name: Render (HTML + PDF)
        run: quarto render

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: experimental-physics-book-pdf
          path: _book/*.pdf
          retention-days: 90

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4  # v4 targets Node 22
        with:
          path: _book/

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
